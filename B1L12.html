                title: 'F. 子貢（端木賜）',
                tagline: '長袖善舞的「外交企業家」',
                trait: '有口才，能料事，且長於外交，善於「貨殖」經商。在孔門中，你極富實踐智慧，能洞察市場先機且「億則屢中」。你將語言的天賦發揮在外交斡旋與商業運作上，為團隊解決實際的危機。',
                insight: '你的才華在於能將高遠的理想，轉化為人際與物質上的非凡成果。'
            },
            G: {
                emoji: '📐',
                category: '⚔️ 政事科 · 致力實務，安定環境',
                title: 'G. 冉有（冉求）',
                tagline: '實事求是的「行政理務專家」',
                trait: '性謙退，有才藝，尤長於政事與理財。你是一位務實的實幹家，擅長在幕後規劃、調配資源，解決具體的行政問題。雖然你偶爾會給自己「畫地自限」，但你的專業與執行力是團隊運作不可或缺的基石。',
                insight: '學會相信自己的能力，你的實務手腕能將一切混亂理出秩序。'
            },
            H: {
                emoji: '🛡️',
                category: '⚔️ 政事科 · 致力實務，安定環境',
                title: 'H. 子路（仲由）',
                tagline: '義氣當先的「熱血捍衛者」',
                trait: '性率直，好勇有政才，志高重信。你充滿激情與行動力，是個為朋友不惜奉獻一切的「帶刀侍衛」。你講求誠信，甚至在面臨生死考驗時，依然能堅守心中的大義與承諾（「結纓而死」）。',
                insight: '你的勇敢無畏需要「好謀而成」的理智配合，才能成為守護正義的最強力量。'
            },
            I: {
                emoji: '🎻',
                category: '🎨 文學科 · 文化底蘊，涵養人心',
                title: 'I. 子游（言偃）',
                tagline: '弘揚美學的「禮樂教化者」',
                trait: '性簡約疏闊，深熟禮學。你深信文化、藝術與音樂（弦歌之聲）具有感化人心、消弭暴戾的力量。你反對殺雞用牛刀的粗暴，主張在日常生活中用精緻的禮教與人文底蘊，來提升群體的生命價值。',
                insight: '你的溫柔能撫平粗糙的現實，用美感與溫度灌溉冰冷的世界。'
            },
            J: {
                emoji: '📚',
                category: '🎨 文學科 · 文化底蘊，涵養人心',
                title: 'J. 子夏（卜商）',
                tagline: '西河設教的「文化傳承者」',
                trait: '熟習經學，在孔門中極具文化傳承的耐力（如《詩經》）。你務實、嚴謹，在晚年設教於西河之上，成為名重一時的導師。你強調日常學習的積累（「日新」），用系統化的知識指引後進。',
                insight: '你的價值在於「承先啟後」，在恆常的鑽研中，點亮智慧的火炬。'
            }
        };

        let currentQuestionIndex = 0;
        let scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0, H: 0, I: 0, J: 0 };
        let finalKey = 'A';

        function hideAll() {
            ['intro-section', 'quiz-section', 'loading-section', 'result-section', 'conclusion-section']
                .forEach((id) => document.getElementById(id).classList.add('hidden-section'));
        }

        function emptyScores() {
            return { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0, H: 0, I: 0, J: 0 };
        }

        function startQuiz() {
            const className = document.getElementById('input-class').value.trim();
            const seat = document.getElementById('input-seat').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const err = document.getElementById('name-error');
            if (!className || !seat || !name) {
                err.classList.remove('hidden-section');
                return;
            }
            err.classList.add('hidden-section');
            ActivitySubmit.saveStudent({ className, seat, name });
            currentQuestionIndex = 0;
            scores = emptyScores();
            hideAll();
            const quiz = document.getElementById('quiz-section');
            quiz.classList.remove('hidden-section');
            quiz.classList.add('fade-in');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-counter').textContent =
                `進度：${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width =
                `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').textContent = q.question;

            const box = document.getElementById('options-container');
            box.innerHTML = '';
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'option-btn w-full text-left py-3.5 px-4 border-2 border-sage-mist rounded-2xl bg-white hover:border-sage-leaf hover:bg-sage-soft text-sage-ink/85 shadow-sm font-medium text-[15px] sm:text-base leading-relaxed';
                btn.innerHTML = `<span class="font-black text-sage-leaf mr-1">${opt.key}.</span>${formatRich(opt.text)}`;
                btn.onclick = () => selectOption(opt.key);
                box.appendChild(btn);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectOption(key) {
            scores[key] += 1;
            currentQuestionIndex += 1;
            if (currentQuestionIndex < questions.length) {
                setTimeout(loadQuestion, 120);
            } else {
                finishQuiz();
            }
        }

        function pickWinner() {
            let best = 'A';
            let max = -1;
            'ABCDEFGHIJ'.split('').forEach((k) => {
                if (scores[k] > max) {
                    max = scores[k];
                    best = k;
                }
            });
            return best;
        }

        function finishQuiz() {
            hideAll();
            document.getElementById('loading-section').classList.remove('hidden-section');
            finalKey = pickWinner();
            const data = results[finalKey];

            setTimeout(() => {
                hideAll();
                const sec = document.getElementById('result-section');
                sec.classList.remove('hidden-section');
                sec.classList.add('fade-in');
                document.getElementById('result-emoji').textContent = data.emoji;
                document.getElementById('result-category').textContent = data.category;
                document.getElementById('result-title').textContent = data.title;
                document.getElementById('result-tagline').textContent = data.tagline;
                document.getElementById('result-desc').innerHTML =
                    `<p><span class="font-bold text-sage-deep">賢人特質</span><br>${formatRich(data.trait)}</p>` +
                    `<p><span class="font-bold text-sage-deep">靈魂啟示</span><br>${formatRich(data.insight)}</p>`;
                document.getElementById('upload-status').textContent = '';
                submitResult(data);
            }, 700);
        }

        function setUploadStatus(msg, kind) {
            const el = document.getElementById('upload-status');
            el.textContent = msg;
            el.className = 'text-xs font-bold min-h-[1.25rem] mb-4 ';
            if (kind === 'success') el.classList.add('text-green-700');
            else if (kind === 'error') el.classList.add('text-red-600');
            else if (kind === 'warn') el.classList.add('text-amber-700');
            else el.classList.add('text-sage-leaf');
        }

        async function submitResult(data) {
            const resultLabel = `${data.title}｜${data.tagline}`;
            const extra = JSON.stringify({ scores, winner: finalKey, category: data.category });
            try {
                await ActivitySubmit.submit({
                    activityId: ACTIVITY_ID,
                    activityName: ACTIVITY_NAME,
                    result: resultLabel,
                    extra,
                    captureEl: document.getElementById('result-section'),
                    onStatus: setUploadStatus
                });
            } catch (err) {
                console.error(err);
            }
        }

        function showConclusion() {
            hideAll();
            const sec = document.getElementById('conclusion-section');
            sec.classList.remove('hidden-section');
            sec.classList.add('fade-in');
        }
    </script>
</body>
</html>
