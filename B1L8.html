<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <link rel="stylesheet" href="shared/mobile.css">
    <title>教學活動產生器：孔乙己與魯迅的時代</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 清末民初風格自訂字體與排版設定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        .vintage-theme {
            font-family: 'Noto Serif TC', serif;
            background-color: #f4ecd8; /* 泛黃舊紙張背景 */
            color: #3b2f2f; /* 深墨色文字 */
        }
        
        .vintage-border {
            border: 2px solid #5a4b43;
            padding: 2px;
            position: relative;
        }

        .vintage-border::before {
            content: '';
            position: absolute;
            top: 2px; bottom: 2px; left: 2px; right: 2px;
            border: 1px solid #5a4b43;
            pointer-events: none;
        }

        .btn-vintage {
            background-color: #7b2c26; /* 復古紅 */
            color: #f4ecd8;
            border: 1px solid #3b2f2f;
            transition: all 0.2s;
        }
        .btn-vintage:hover {
            background-color: #5a1c17;
        }
        
        /* 教師後台現代化風格 */
        .teacher-theme {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }
    </style>

<body class="min-h-screen transition-colors duration-500" id="main-body">


    <!-- ========================================== -->
    <!-- 區塊 1：教師設定專區 (#teacher-setup)         -->
    <!-- ========================================== -->
    


    <!-- ========================================== -->
    <!-- 區塊 2：學生實際畫面 / 預覽區 (#student-mode)    -->
    <!-- ========================================== -->
    <div id="student-mode" class="min-h-screen vintage-theme p-4 md:p-8">
        <div class="max-w-3xl mx-auto vintage-border p-6 md:p-10 bg-[#fbf5e6] shadow-xl">
            
            <!-- (1) 歡迎首頁 -->
            <div id="screen-welcome" class="text-center space-y-6">
                <div class="text-sm text-[#7b2c26] tracking-widest mb-2 border-b-2 border-[#5a4b43] inline-block pb-1">魯迅經典文學探索</div>
                <h1 class="text-4xl md:text-5xl font-bold mb-4">《孔乙己》與他的時代</h1>
                <p class="text-lg leading-relaxed text-gray-800">
                    民國初年，新舊思潮劇烈碰撞。魯鎮的咸亨酒店裡，來來往往的人影中，藏著那個時代最真實的悲歡離合。<br><br>
                    準備好踏入清末民初的街頭了嗎？讓我們透過5個情境考驗，看看你的靈魂最貼近魯迅筆下的哪一位經典人物。
                </p>
                <div class="text-left space-y-3 pt-4 border-t border-[#5a4b43]/30">
                    <div class="flex flex-col md:flex-row gap-4 mobile-stack">
                        <div class="flex-1">
                            <label class="block text-sm font-bold mb-1">班級 (例: 404)</label>
                            <input type="text" id="input-class" class="w-full p-3 text-base border border-[#5a4b43] bg-white focus:outline-none focus:ring-2 focus:ring-[#7b2c26]">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-bold mb-1">座號 (例: 05)</label>
                            <input type="text" id="input-seat" class="w-full p-3 text-base border border-[#5a4b43] bg-white focus:outline-none focus:ring-2 focus:ring-[#7b2c26]">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">姓名</label>
                        <input type="text" id="input-name" class="w-full p-3 text-base border border-[#5a4b43] bg-white focus:outline-none focus:ring-2 focus:ring-[#7b2c26]">
                    </div>
                    <p id="welcome-error" class="hidden text-sm text-red-600 font-bold text-center">請填寫班級、座號與姓名後再開始</p>
                </div>
                <div class="pt-8">
                    <button onclick="startQuiz()" class="btn-vintage text-xl font-bold py-3 px-6 rounded shadow-md w-full mobile-cta-full">
                        開始測驗：尋找你的時代靈魂
                    </button>
                </div>
            </div>

            <!-- (2) 互動活動/測驗進行中 -->
            <div id="screen-quiz" class="hidden space-y-6">
                <div class="flex justify-between items-center border-b border-[#5a4b43] pb-2 mb-6">
                    <h2 class="text-2xl font-bold">時代情境測驗</h2>
                    <span id="quiz-progress" class="text-sm font-bold text-[#7b2c26]">第 1 / 5 題</span>
                </div>
                
                <h3 id="question-text" class="text-xl font-bold leading-relaxed mb-6">問題將顯示在此處</h3>
                <div id="options-container" class="space-y-4">
                    <!-- 選項按鈕會透過 JS 動態生成 -->
                </div>
            </div>

            <!-- (3) 顯示測驗結果 -->
            <div id="screen-result" class="hidden space-y-6 text-center">
                <h2 class="text-2xl font-bold border-b-2 border-[#5a4b43] inline-block pb-2 mb-4">靈魂鑑定結果</h2>
                <div class="bg-white/50 p-6 rounded-sm border border-[#5a4b43] mb-4">
                    <h3 class="text-sm text-gray-600 mb-1">你的靈魂特質對應角色為：</h3>
                    <div id="result-character" class="text-4xl font-bold text-[#7b2c26] mb-3">孔乙己</div>
                    <p id="result-desc" class="text-md text-gray-800 text-left leading-relaxed">
                        說明文字。
                    </p>
                </div>
                <div class="text-left">
                    <label class="block text-sm font-bold mb-1">對清末民初時期的印象（選填）</label>
                    <textarea id="input-impression" rows="2" class="w-full p-3 text-base border border-[#5a4b43] bg-white focus:outline-none focus:ring-2 focus:ring-[#7b2c26] resize-none"></textarea>
                </div>
                <p id="upload-status" class="text-sm font-bold text-center min-h-[1.25rem] text-[#7b2c26]"></p>
            </div>

            <!-- (5) 送出成功畫面 -->
            <div id="screen-success" class="hidden text-center space-y-6 py-10">
                <div class="text-6xl mb-4">📜</div>
                <h2 class="text-3xl font-bold text-[#7b2c26]">繳交成功！</h2>
                <p class="text-lg">您的時代足跡與學習紀錄已順利封存至檔案庫。</p>
                <p id="upload-status-success" class="text-sm font-bold text-green-800"></p>
                <p class="text-sm text-gray-600 mt-8">感謝參與本次文學探險。</p>
            </div>

        </div>
    </div>


    <!-- ========================================== -->
    <!-- 區塊 3：教師預覽浮動控制列 (#teacher-preview-bar) -->
    <!-- ========================================== -->
    


    <!-- ========================================== -->
    <!-- 區塊 4：最終匯出與教學專區 (#teacher-export)  -->
    <!-- ========================================== -->
    


    <!-- ========================================== -->
    <!-- JavaScript 核心邏輯區                         -->
    <!-- ========================================== -->
    <script src="shared/config.js"></script>
    <script src="shared/activity-submit.js"></script>
    <script>
        const ACTIVITY_ID = 'B1L8';
        const ACTIVITY_NAME = '孔乙己與他的時代';
        let finalCharacterName = '';

        function setUploadStatus(msg, kind) {
            const el = document.getElementById('upload-status');
            if (!el) return;
            el.textContent = msg || '';
            el.className = 'text-sm font-bold text-center min-h-[1.25rem] ';
            if (kind === 'error') el.className += 'text-red-600';
            else if (kind === 'success') el.className += 'text-green-800';
            else if (kind === 'warn') el.className += 'text-yellow-800';
            else el.className += 'text-[#7b2c26]';
            const okEl = document.getElementById('upload-status-success');
            if (okEl && kind === 'success') okEl.textContent = msg;
        }

        async function autoSubmitResult() {
            const extra = (document.getElementById('input-impression')?.value || '').trim();
            try {
                await ActivitySubmit.submit({
                    activityId: ACTIVITY_ID,
                    activityName: ACTIVITY_NAME,
                    result: finalCharacterName,
                    extra,
                    captureEl: document.getElementById('screen-result'),
                    onStatus: setUploadStatus
                });
            } catch (err) {
                console.error(err);
            }
        }

        // -------------------------
        // 人物特質與分數統計系統
        // -------------------------
        let userScores = {
            "孔乙己": 0,
            "咸亨酒店小夥計": 0,
            "酒店掌櫃": 0,
            "丁舉人": 0,
            "狂人": 0,
            "祥林嫂": 0,
            "阿Q": 0
        };

        const CHARACTERS = [
            { name: "孔乙己", desc: "你像孔乙己一樣，內心有著對知識的堅持與善良（如分豆子給小孩），但可能受到舊有觀念的束縛，在面對時代變遷時顯得格格不入。記得學會變通，放下無謂的身段！" },
            { name: "咸亨酒店小夥計", desc: "你像小夥計一樣，具備冷靜觀察周遭事物的能力。但在環境影響下，有時可能會選擇冷眼旁觀或隨波逐流。試著在保持清醒的同時，多給予他人一點溫暖的同情吧。" },
            { name: "酒店掌櫃", desc: "你具有掌櫃般精明的現實感與商業頭腦，凡事以利益與生存為先。但要注意，過度看重利益與帳本，可能會讓你失去對弱者的基本關懷與人情味。" },
            { name: "丁舉人", desc: "你對應的是丁舉人。你崇尚權威與階級秩序，在既定的制度中游刃有餘甚至掌握權力，遇到破壞規矩的人絕不寬貸。但切記權力是一把雙面刃，過度的傲慢最終會讓人迷失。" },
            { name: "狂人", desc: "你就像《狂人日記》中的狂人，是一位能看透世俗禮教「吃人」本質的清醒者。雖然你的思想超前常不被眾人理解，但你具備打破陳規、呼籲改變的革命潛力！" },
            { name: "祥林嫂", desc: "你的靈魂深處對應著祥林嫂。你或許勤勞且堅忍，但很容易受到傳統社會壓力或他人眼光的影響而感到深深的焦慮與自責。請相信自己的價值，不要被無形的道德枷鎖綁架。" },
            { name: "阿Q", desc: "你具備阿Q的「精神勝利法」。面對挫折與不如意，你總能找到一套方法自我安慰，迅速脫離痛苦。這是一種強大的生存適應力，但也要小心不要流於自欺欺人喔。" }
        ];

        // 全面重寫的 5 題情境心理測驗：完全基於「作答者視角」的處事反應
        const QUIZ_QUESTIONS = [
            {
                q: "情境一：當你在大庭廣眾之下，因為犯了個小錯或遇到窘境而被人指責、嘲笑時，你通常的直覺反應會是？",
                opts: [
                    { text: "死要面子，搬出各種看似合理的大道理為自己辯解，極力維護尊嚴。", char: "孔乙己" },
                    { text: "在心裡冷笑「這群人真無知」，用自己的邏輯說服自己其實是贏家，轉頭就忘記了。", char: "阿Q" },
                    { text: "陷入深深的自責與焦慮，不斷向周圍的人解釋，希望能獲得大家的諒解與同情。", char: "祥林嫂" },
                    { text: "認為自己絕不可能有錯！一定利用權勢或人脈給那些敢嘲笑我的人迎頭痛擊。", char: "丁舉人" }
                ]
            },
            {
                q: "情境二：在你的工作或生活中，當你面對社會底層、生活困苦的人時，你的態度偏向哪一種？",
                opts: [
                    { text: "雖然我自己生活也很困頓，但我仍願意釋出善意，把僅有的一點資源分給需要的人（例如小孩）。", char: "孔乙己" },
                    { text: "為了融入大環境，我會跟著群眾一起嘲笑他們，當作無聊生活中的一種消遣。", char: "咸亨酒店小夥計" },
                    { text: "我只在乎他們身上還有沒有錢可以賺。如果有欠債，我會牢牢記在帳本上絕不放過。", char: "酒店掌櫃" },
                    { text: "我能看透他們是被這個病態社會所壓迫，希望能喚醒大眾，救救這些可憐人。", char: "狂人" }
                ]
            },
            {
                q: "情境三：面對充滿變數與壓力的未來，你覺得你活下去「最大的目標」或「生存哲學」是什麼？",
                opts: [
                    { text: "努力往上爬，適應並利用現有的制度（如科舉），一旦掌握權力就可以高高在上。", char: "丁舉人" },
                    { text: "現實至上，最大的目標就是穩定獲利，生意興隆。為了生存，有時稍微變通也無妨。", char: "酒店掌櫃" },
                    { text: "沒什麼大志向，只希望能把交代的無聊工作做好，平平安安過完每一天。", char: "咸亨酒店小夥計" },
                    { text: "一生安分守己，最大的恐懼是犯下道德上的罪孽，深怕死後靈魂會受到嚴厲的懲罰。", char: "祥林嫂" }
                ]
            },
            {
                q: "情境四：面對社會上傳統且僵化、甚至不合理的主流體制（如升學主義、社會規範），你抱持什麼態度？",
                opts: [
                    { text: "堅信傳統體制（如「萬般皆下品，惟有讀書高」）是唯一的正途，哪怕窮困潦倒也絕不放下身段。", char: "孔乙己" },
                    { text: "深刻意識到這體制的虛偽與殘酷，不願同流合污，即使被當作「瘋子」也要大聲疾呼。", char: "狂人" },
                    { text: "雖然處處碰壁，但我總能自我安慰，不合理的規定對我來說只要精神上勝利就不算吃虧。", char: "阿Q" },
                    { text: "體制什麼的與我無關，我只關心這項規定能不能幫我獲利或省下麻煩。", char: "酒店掌櫃" }
                ]
            },
            {
                q: "情境五：當你看到社會上發生明顯不公不義的事情時，你的第一直覺是？",
                opts: [
                    { text: "我只是一個旁觀者，這不關我的事，在旁邊默默看熱鬧就好。", char: "咸亨酒店小夥計" },
                    { text: "感到無比憤怒與清醒，認為這個社會生病了，必須有人站出來揭露真相！", char: "狂人" },
                    { text: "認為這就是社會階級的必然現象，弱肉強食是真理，沒什麼好大驚小怪的。", char: "丁舉人" },
                    { text: "滿口大道理，用一些迂腐的道德標準來評論一番，但實際上什麼忙也幫不上。", char: "孔乙己" }
                ]
            }
        ];

        let currentQuestionIndex = 0;

        // -------------------------
        // 流程控制函數
        // -------------------------

        // 教師點擊預覽
        function startPreview() {
            const urlInput = document.getElementById('gas-url-input');
            if (!urlInput) return;
            const url = urlInput.value.trim();
            if(!url) {
                alert("請填寫 Google Apps Script 的網址！");
                return;
            }
            if (window.ACTIVITY_CONFIG) ACTIVITY_CONFIG.GAS_URL = url;
            const setup = document.getElementById('teacher-setup');
            if (setup) setup.classList.add('hidden');
            document.body.classList.remove('teacher-theme');
            const studentMode = document.getElementById('student-mode');
            if (studentMode) studentMode.classList.remove('hidden');
            const bar = document.getElementById('teacher-preview-bar');
            if (bar) bar.classList.remove('hidden');
        }

        // 學生開始測驗
        function startQuiz() {
            const className = document.getElementById('input-class').value.trim();
            const seat = document.getElementById('input-seat').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const errEl = document.getElementById('welcome-error');
            if (!className || !seat || !name) {
                if (errEl) errEl.classList.remove('hidden');
                return;
            }
            if (errEl) errEl.classList.add('hidden');
            ActivitySubmit.saveStudent({ className, seat, name });

            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            currentQuestionIndex = 0;
            
            // 重置分數
            for(let key in userScores) {
                userScores[key] = 0;
            }

            renderQuestion();
        }

        // 渲染測驗題目
        function renderQuestion() {
            if (currentQuestionIndex >= QUIZ_QUESTIONS.length) {
                showResult();
                return;
            }

            const qData = QUIZ_QUESTIONS[currentQuestionIndex];
            document.getElementById('question-text').innerText = `Q${currentQuestionIndex + 1}. ${qData.q}`;
            document.getElementById('quiz-progress').innerText = `第 ${currentQuestionIndex + 1} / ${QUIZ_QUESTIONS.length} 題`;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            qData.opts.forEach((optObj) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border border-[#5a4b43] bg-white/50 hover:bg-[#dcc2a3] transition-colors rounded-sm text-gray-800 text-lg shadow-sm";
                btn.innerText = optObj.text;
                
                btn.onclick = () => {
                    // 計分邏輯：將選擇的角色加一分
                    userScores[optObj.char]++;
                    
                    // 進入下一題
                    currentQuestionIndex++;
                    renderQuestion();
                };
                optsContainer.appendChild(btn);
            });
        }

        // 計算最高分並顯示結果與表單
        function showResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            
            // 找出最高分的角色
            let maxCharName = Object.keys(userScores).reduce((a, b) => userScores[a] > userScores[b] ? a : b);
            
            // 如果遇到同分情況，reduce 會取第一個找到的。為了保證結果的有效性，直接以此角色對應資料。
            const finalCharacter = CHARACTERS.find(c => c.name === maxCharName);
            
            finalCharacterName = finalCharacter.name;
            document.getElementById('result-character').innerText = finalCharacter.name;
            document.getElementById('result-desc').innerText = finalCharacter.desc;
            setTimeout(() => autoSubmitResult(), 400);
        }

        // -------------------------
        // 教師核心匯出邏輯 (產生給學生的最終 HTML)
        // -------------------------
        function generateFinalCode() {
            // 1. 複製一份當前的 DOM
            let clone = document.documentElement.cloneNode(true);

            // 2. 徹底移除教師專用的區塊
            const setupBlock = clone.querySelector('#teacher-setup');
            if(setupBlock) setupBlock.remove();
            
            const previewBar = clone.querySelector('#teacher-preview-bar');
            if(previewBar) previewBar.remove();
            
            const exportBlock = clone.querySelector('#teacher-export');
            if(exportBlock) exportBlock.remove();

            // 3. 確保 Body 沒有 teacher-theme
            clone.querySelector('body').classList.remove('teacher-theme');

            // 4. 重置學生區塊到最原始的歡迎畫面狀態
            clone.querySelector('#student-mode').classList.remove('hidden');
            clone.querySelector('#screen-welcome').classList.remove('hidden');
            clone.querySelector('#screen-quiz').classList.add('hidden');
            clone.querySelector('#screen-result').classList.add('hidden');
            clone.querySelector('#screen-success').classList.add('hidden');
            
            // 5. 轉換為字串
            let htmlString = clone.outerHTML;

            // 6. 加上 DOCTYPE 並顯示在區塊 4
            const finalHTML = "<!DOCTYPE html>\n" + htmlString;
            
            document.body.classList.add('teacher-theme');
            const studentModeEl = document.getElementById('student-mode');
            if (studentModeEl) studentModeEl.classList.add('hidden');
            const previewBar = document.getElementById('teacher-preview-bar');
            if (previewBar) previewBar.classList.add('hidden');
            
            const exportSection = document.getElementById('teacher-export');
            if (exportSection) exportSection.classList.remove('hidden');
            
            const codeArea = document.getElementById('final-html-code');
            if (codeArea) codeArea.value = finalHTML;
        }

        // 複製代碼功能
        function copyCode() {
            const codeArea = document.getElementById('final-html-code');
            if (!codeArea) return;
            codeArea.select();
            codeArea.setSelectionRange(0, 99999); // 給行動裝置使用
            
            try {
                // 兼容性較高的複製方法
                document.execCommand('copy');
                alert("✅ 程式碼已成功複製！您可以前往 Google 協作平台貼上了。");
            } catch (err) {
                alert("複製失敗，請手動全選後複製 (Ctrl+C / Cmd+C)。");
            }
        }
    </script>

</body></html>
