        body {
            background-color: #FFF6D9; /* story-yellow */
            color: #5A4A42; /* story-text */
            background-image: radial-gradient(#FFB067 0.5px, transparent 0.5px), radial-gradient(#FFB067 0.5px, #FFF6D9 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-attachment: fixed;
        }
        .cute-border {
            border: 4px solid #FFB067;
            border-radius: 24px;
        }
        .btn-cute {
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #D98842;
        }
        .btn-cute:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #D98842;
        }
        /* Custom Scrollbar for Textarea */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFF6D9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #FFB067; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #D98842; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        <div class="absolute top-10 right-10 text-4xl opacity-20">⭐</div>

        <!-- ========================================== -->
        <!-- 區塊 2：學生實際畫面 / 預覽區 (#student-mode) -->
        <!-- ========================================== -->
        <div id="student-mode" style="display: flex;" class="fade-in relative z-10 w-full min-h-[500px] flex flex-col justify-center">
            
            <!-- 學生畫面 2-1：歡迎首頁 -->
            <div id="student-welcome" class="text-center space-y-6" style="display: block;">
                <div class="text-8xl mb-4">🌍</div>
                <h1 class="text-3xl md:text-5xl font-bold text-story-text leading-tight">尋找你的 B612 <br><span class="text-story-orange text-2xl md:text-3xl">《小王子》課前心理測驗</span></h1>
                <p class="text-lg text-gray-600 max-w-md mx-auto">在我們進入聖修伯里的純真世界之前，先來做個小測驗，看看你的靈魂最貼近故事中的哪位角色吧！</p>
                <div class="w-full max-w-md mx-auto text-left space-y-4 mt-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-bold mb-2 ml-1">班級</label>
                            <input type="text" id="input-class" placeholder="例如：403" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-story-green focus:bg-white transition outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-bold mb-2 ml-1">座號</label>
                            <input type="text" id="input-seat" placeholder="例如：05" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-story-green focus:bg-white transition outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 ml-1">姓名</label>
                        <input type="text" id="input-name" placeholder="請輸入姓名" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-story-green focus:bg-white transition outline-none">
                    </div>
                    <p id="student-info-error" style="display: none;" class="text-red-600 text-sm font-bold text-center bg-red-50 py-2 rounded-xl">請填寫班級、座號與姓名才能開始測驗！</p>
                </div>
                <button onclick="startQuiz()" class="btn-cute bg-story-green text-white text-xl font-bold py-3 px-12 rounded-full hover:bg-green-400 mt-6 inline-block">
                    開始旅程 🚀
                </button>
            </div>

            <!-- 學生畫面 2-2：測驗進行中 -->
            <div id="student-quiz" style="display: none;" class="w-full max-w-2xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-story-orange font-bold text-lg" id="quiz-progress">進度 5 / 5</span>
                    <div class="flex space-x-1" id="quiz-dots"><div class="w-3 h-3 rounded-full bg-story-orange opacity-50"></div><div class="w-3 h-3 rounded-full bg-story-orange opacity-50"></div><div class="w-3 h-3 rounded-full bg-story-orange opacity-50"></div><div class="w-3 h-3 rounded-full bg-story-orange opacity-50"></div><div class="w-3 h-3 rounded-full bg-story-orange"></div></div>
                </div>
                
                <div class="bg-orange-50 p-6 md:p-8 rounded-3xl border-2 border-orange-100 shadow-sm mb-6">
                    <h2 id="question-text" class="text-2xl font-bold text-story-text mb-6 leading-relaxed">Q5. 讀完這幾個情境，你覺得大人世界最讓你感到困惑或奇怪的地方是什麼？</h2>
                    <div id="options-container" class="space-y-4"><button class="w-full text-left p-4 rounded-xl border-2 border-orange-200 bg-white hover:bg-orange-100 hover:border-story-orange transition text-story-text font-medium text-lg">大人總是在意數字、金錢，卻忽略了真正重要的事物。</button><button class="w-full text-left p-4 rounded-xl border-2 border-orange-200 bg-white hover:bg-orange-100 hover:border-story-orange transition text-story-text font-medium text-lg">大人總是盲目地遵守規定，忘記了思考為什麼要這麼做。</button><button class="w-full text-left p-4 rounded-xl border-2 border-orange-200 bg-white hover:bg-orange-100 hover:border-story-orange transition text-story-text font-medium text-lg">大人太需要別人的讚美和崇拜來證明自己的價值。</button><button class="w-full text-left p-4 rounded-xl border-2 border-orange-200 bg-white hover:bg-orange-100 hover:border-story-orange transition text-story-text font-medium text-lg">大人很難懂，但我們只要用心去感受人與人之間的羈絆就好。</button></div>
                </div>
            </div>

            <!-- 學生畫面 2-3：測驗結果 -->
            <div id="student-result-form" style="display: none;" class="w-full max-w-2xl mx-auto text-center">
                <div id="result-capture-card" class="mb-8">
                    <h2 class="text-xl text-gray-500 font-bold mb-2">測驗結果分析...</h2>
                    <div id="result-icon" class="text-8xl mb-4">👦</div>
                    <h3 class="text-3xl font-bold text-story-orange mb-4">你的靈魂角色是：<span id="result-title" class="text-story-text">小王子</span></h3>
                    <p id="result-desc" class="text-gray-700 bg-orange-50 p-6 rounded-2xl border-2 border-orange-100 text-left leading-relaxed">你保有純真與好奇心！你不會被世俗的價值觀綁架，總是能看透事物表象，直達事物的核心。對你來說，愛與責任才是生命中最重要的事。</p>
                    <div class="mt-6 text-left max-w-lg mx-auto">
                        <label class="block text-gray-700 font-bold mb-2 ml-1">選填：對《小王子》的初步印象或期待</label>
                        <textarea id="form-impression" rows="2" placeholder="可留空，系統已自動上傳結果…" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-story-green focus:bg-white transition outline-none resize-none"></textarea>
                    </div>
                    <p id="upload-status" class="text-sm font-bold text-gray-500 mt-4 min-h-[1.25rem]"></p>
                </div>
            </div>

            <!-- 學生畫面 2-4：送出成功畫面 -->
            <div id="student-success" style="display: none;" class="text-center py-10">
                <div class="text-8xl mb-6">✨</div>
                <h2 class="text-3xl font-bold text-story-text mb-4">紀錄已送達星空！</h2>
                <p class="text-lg text-gray-600">你的資料已經成功傳送給老師囉。<br>期待在課堂上一起探索《小王子》的世界！</p>
                <p id="upload-status-success" class="text-sm font-bold text-gray-500 mt-4 min-h-[1.25rem]"></p>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 區塊 4：最終匯出與教學專區 (#teacher-export) -->
        <!-- ========================================== -->
        

    </div> <!-- End Main Container -->

    <!-- ========================================== -->
    <!-- 區塊 3：教師預覽浮動控制列 (#teacher-preview-bar) -->
    <!-- ========================================== -->
    

    <!-- ========================================== -->
    <!-- 核心 JavaScript 邏輯 -->
    <!-- ========================================== -->
    <script src="shared/config.js"></script>
    <script src="shared/activity-submit.js"></script>
    <script>
        const ACTIVITY_ID = 'B1L4';
        const ACTIVITY_NAME = '尋找你的B612';

        // --- 測驗資料設定 ---
        const QUIZ_DATA = [
            {
                question: "想像你駕駛飛機迫降在荒涼的沙漠，突然有個金髮小男孩出現，請你幫他畫一隻羊。你當下最直覺的反應是？",
                options: [
                    { text: "覺得他很煩，我正在煩惱飛機引擎壞掉會死掉耶！", type: 'businessman' },
                    { text: "雖然覺得莫名其妙，但還是拿起筆試著畫給他看。", type: 'prince' },
                    { text: "告訴他：「我不懂畫畫，但我可以教你怎麼修飛機。」", type: 'lamplighter' },
                    { text: "命令他：「小孩子不要吵，去旁邊乖乖坐好！」", type: 'king' }
                ]
            },
            {
                question: "如果你要離開一朵你深愛、但總是對你驕傲任性、甚至有點愛慕虛榮的玫瑰花，你的心情是？",
                options: [
                    { text: "覺得解脫了，終於不用再伺候她。", type: 'conceited' },
                    { text: "非常自責且不捨，覺得自己應該要對她負責。", type: 'prince' }, // or rose
                    { text: "心裡難過，但認為她必須學會自己獨立生存。", type: 'fox' },
                    { text: "計算這段時間在她身上花了多少資源，覺得虧大了。", type: 'businessman' }
                ]
            },
            {
                question: "如果在旅途中，遇到一隻渴望被你「馴服」(建立關係)的狐狸。你認為「馴服」代表什麼意義？",
                options: [
                    { text: "就是讓牠聽我的話，成為我的寵物。", type: 'king' },
                    { text: "花時間陪伴彼此，讓對方成為世界上獨一無二的存在。", type: 'fox' },
                    { text: "一種負擔，因為一旦建立了關係，就有可能會流淚。", type: 'rose' },
                    { text: "每天固定時間餵牠，這是我身為主人的工作。", type: 'lamplighter' }
                ]
            },
            {
                question: "當你看到一個國王，坐在一顆根本沒有其他子民的小行星上，卻不斷對著空氣發號施令。你覺得他？",
                options: [
                    { text: "太可笑了，這根本是自欺欺人。", type: 'fox' },
                    { text: "有點可憐，他只是太寂寞，需要有人覺得他很重要。", type: 'prince' },
                    { text: "只要不妨礙到我算帳，他開心就好。", type: 'businessman' },
                    { text: "這很正常啊，有權力本來就該展現出來。", type: 'conceited' }
                ]
            },
            {
                question: "讀完這幾個情境，你覺得大人世界最讓你感到困惑或奇怪的地方是什麼？",
                options: [
                    { text: "大人總是在意數字、金錢，卻忽略了真正重要的事物。", type: 'prince' },
                    { text: "大人總是盲目地遵守規定，忘記了思考為什麼要這麼做。", type: 'lamplighter' },
                    { text: "大人太需要別人的讚美和崇拜來證明自己的價值。", type: 'conceited' },
                    { text: "大人很難懂，但我們只要用心去感受人與人之間的羈絆就好。", type: 'fox' }
                ]
            }
        ];

        const RESULTS_DATA = {
            'prince': { name: '小王子', icon: '👦', desc: '你保有純真與好奇心！你不會被世俗的價值觀綁架，總是能看透事物表象，直達事物的核心。對你來說，愛與責任才是生命中最重要的事。' },
            'fox': { name: '狐狸', icon: '🦊', desc: '你充滿智慧且重視感情！你明白「真正重要的東西，用眼睛是看不見的，必須用用心去看」。你懂得經營關係，且珍惜身邊獨一無二的存在。' },
            'rose': { name: '玫瑰', icon: '🌹', desc: '你內心柔軟但外表傲嬌！你渴望被愛、被重視，有時會用一點小脾氣來掩飾內心的不安。其實，只要有人願意懂你，你就能綻放最美的樣子。' },
            'king': { name: '國王', icon: '👑', desc: '你渴望掌控全局！你有一種與生俱來的領導慾望，希望事物都在你的掌握之中。但要記得，真正的權威建立在理解與理智之上喔！' },
            'conceited': { name: '愛慕虛榮的人', icon: '🎩', desc: '你非常在意他人的眼光！你希望成為眾人焦點，喜歡聽讚美的話。適度的自信是好的，但別忘了，你自身的價值不需要一直依賴別人的掌聲來證明。' },
            'businessman': { name: '實業家', icon: '💼', desc: '你非常務實且認真！你重視效率和實質的收穫，總是忙於手邊的工作。不過，偶爾也該停下腳步，抬頭看看滿天的星空，享受一下無所事事的浪漫。' },
            'lamplighter': { name: '點燈人', icon: '💡', desc: '你忠於職守且無私！你對自己的責任非常看重，甚至會為了完成任務而犧牲自己的休息時間。你是一個非常可靠的人，但也要記得多照顧自己喔！' }
        };

        let currentQuestionIndex = 0;
        let userScores = {
            prince: 0, fox: 0, rose: 0, king: 0, conceited: 0, businessman: 0, lamplighter: 0
        };
        let finalResultName = '';
        let activitySubmitStarted = false;

        function setUploadStatus(msg, kind) {
            ['upload-status', 'upload-status-success'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = msg;
                el.className = 'text-sm font-bold min-h-[1.25rem] mt-4 ' + (
                    kind === 'success' ? 'text-green-600' :
                    kind === 'error' ? 'text-red-600' :
                    kind === 'warn' ? 'text-orange-600' :
                    kind === 'loading' ? 'text-blue-600' : 'text-gray-500'
                );
            });
        }

        async function submitActivityResult() {
            if (activitySubmitStarted) return;
            activitySubmitStarted = true;
            const impressionEl = document.getElementById('form-impression');
            const extra = impressionEl ? impressionEl.value.trim() : '';
            try {
                await ActivitySubmit.submit({
                    activityId: ACTIVITY_ID,
                    activityName: ACTIVITY_NAME,
                    result: finalResultName,
                    extra: extra,
                    captureEl: document.getElementById('result-capture-card'),
                    onStatus: (msg, kind) => setUploadStatus(msg, kind)
                });
                document.getElementById('student-result-form').style.display = 'none';
                document.getElementById('student-success').style.display = 'block';
            } catch (err) {
                console.error(err);
                activitySubmitStarted = false;
            }
        }

        // --- 教師設定功能 ---
        function copyGasCode() {
            const textarea = document.getElementById('gas-code-block');
            if (!textarea) return;
            textarea.select();
            document.execCommand('copy');
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "已複製!";
            btn.classList.add('bg-green-600');
            setTimeout(() => { btn.innerText = originalText; btn.classList.remove('bg-green-600'); }, 2000);
        }

        function startPreview() {
            const urlInputEl = document.getElementById('gas-url-input');
            if (!urlInputEl) return;
            const urlInput = urlInputEl.value.trim();
            if (!urlInput || !urlInput.startsWith('https://script.google.com/')) {
                urlInputEl.classList.add('border-red-500', 'bg-red-50');
                urlInputEl.value = '';
                urlInputEl.placeholder = '錯誤的網址，請確認是 https://script.google.com/... 開頭';
                setTimeout(() => {
                    urlInputEl.classList.remove('border-red-500', 'bg-red-50');
                    urlInputEl.placeholder = "https://script.google.com/macros/s/...";
                }, 3000);
                return;
            }

            if (window.ACTIVITY_CONFIG) window.ACTIVITY_CONFIG.GAS_URL = urlInput;

            const setup = document.getElementById('teacher-setup');
            if (setup) setup.style.display = 'none';
            document.getElementById('student-mode').style.display = 'flex';
            const previewBar = document.getElementById('teacher-preview-bar');
            if (previewBar) previewBar.style.display = 'flex';
            
            resetStudentView();
        }

        // --- 學生測驗功能 ---
        function resetStudentView() {
            currentQuestionIndex = 0;
            for(let key in userScores) userScores[key] = 0;
            
            document.getElementById('student-welcome').style.display = 'block';
            document.getElementById('student-quiz').style.display = 'none';
            document.getElementById('student-result-form').style.display = 'none';
            document.getElementById('student-success').style.display = 'none';
            const impression = document.getElementById('form-impression');
            if (impression) impression.value = '';
            activitySubmitStarted = false;
        }

        function startQuiz() {
            const className = document.getElementById('input-class').value.trim();
            const seat = document.getElementById('input-seat').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const errEl = document.getElementById('student-info-error');
            if (!className || !seat || !name) {
                if (errEl) errEl.style.display = 'block';
                return;
            }
            if (errEl) errEl.style.display = 'none';
            ActivitySubmit.saveStudent({ className, seat, name });

            document.getElementById('student-welcome').style.display = 'none';
            document.getElementById('student-quiz').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const qData = QUIZ_DATA[currentQuestionIndex];
            document.getElementById('question-text').innerText = `Q${currentQuestionIndex + 1}. ${qData.question}`;
            document.getElementById('quiz-progress').innerText = `進度 ${currentQuestionIndex + 1} / ${QUIZ_DATA.length}`;
            
            // Render Dots
            const dotsContainer = document.getElementById('quiz-dots');
            dotsContainer.innerHTML = '';
            for(let i=0; i<QUIZ_DATA.length; i++) {
                const dot = document.createElement('div');
                dot.className = `w-3 h-3 rounded-full ${i === currentQuestionIndex ? 'bg-story-orange' : (i < currentQuestionIndex ? 'bg-story-orange opacity-50' : 'bg-gray-200')}`;
                dotsContainer.appendChild(dot);
            }

            // Render Options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-orange-200 bg-white hover:bg-orange-100 hover:border-story-orange transition text-story-text font-medium text-lg';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            userScores[type]++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < QUIZ_DATA.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            // 計算最高分的人格
            let maxScore = -1;
            let finalType = 'prince'; // default
            
            for (let type in userScores) {
                if (userScores[type] > maxScore) {
                    maxScore = userScores[type];
                    finalType = type;
                }
            }

            const result = RESULTS_DATA[finalType];
            
            finalResultName = result.name;
            
            document.getElementById('student-quiz').style.display = 'none';
            document.getElementById('student-result-form').style.display = 'block';
            
            document.getElementById('result-icon').innerText = result.icon;
            document.getElementById('result-title').innerText = result.name;
            document.getElementById('result-desc').innerText = result.desc;

            activitySubmitStarted = false;
            setUploadStatus('', '');
            requestAnimationFrame(() => {
                setTimeout(() => submitActivityResult(), 400);
            });
        }

        // --- 核心匯出邏輯 (區塊 4) ---
        function triggerExport() {
            // 1. 複製一份當前的 DOM
            const clonedHtml = document.documentElement.cloneNode(true);
            const clonedBody = clonedHtml.querySelector('body');

            // 2. 徹底移除不需要的區塊
            const elementsToRemove = [
                '#teacher-setup', 
                '#teacher-preview-bar', 
                '#teacher-export'
            ];
            elementsToRemove.forEach(selector => {
                const el = clonedBody.querySelector(selector);
                if (el) el.remove();
            });

            // 3. 確保學生畫面顯示，且為初始狀態 (移除 style="display: none")
            const studentMode = clonedBody.querySelector('#student-mode');
            if (studentMode) {
                studentMode.style.display = 'flex'; // Tailwind flex
                
                // 重置學生內部區塊顯示狀態
                clonedBody.querySelector('#student-welcome').style.display = 'block';
                clonedBody.querySelector('#student-quiz').style.display = 'none';
                clonedBody.querySelector('#student-result-form').style.display = 'none';
                clonedBody.querySelector('#student-success').style.display = 'none';
            }

            let outerHTMLString = clonedHtml.outerHTML;
            const gasUrl = (window.ACTIVITY_CONFIG && window.ACTIVITY_CONFIG.GAS_URL) || '';
            outerHTMLString = outerHTMLString.replace(/GAS_URL:\s*""/, `GAS_URL: "${gasUrl}"`);

            const finalCode = `<!DOCTYPE html>\n${outerHTMLString}`;

            const outputEl = document.getElementById('final-html-output');
            if (!outputEl) return;
            outputEl.value = finalCode;

            const previewBar = document.getElementById('teacher-preview-bar');
            if (previewBar) previewBar.style.display = 'none';
            document.getElementById('student-mode').style.display = 'none';
            const teacherExport = document.getElementById('teacher-export');
            if (teacherExport) teacherExport.style.display = 'block';
        }

        function copyFinalCode() {
            const textarea = document.getElementById('final-html-output');
            if (!textarea) return;
            textarea.select();
            document.execCommand('copy');
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ 已複製成功！";
            btn.classList.replace('bg-story-blue', 'bg-green-500');
            setTimeout(() => { 
                btn.innerHTML = originalText; 
                btn.classList.replace('bg-green-500', 'bg-story-blue'); 
            }, 3000);
        }

        window.onload = function() {
            if (!document.getElementById('teacher-setup')) {
                const studentMode = document.getElementById('student-mode');
                if(studentMode) studentMode.style.display = 'flex';
                resetStudentView();
            }
        };
    </script>

</body></html>
